[build]
  command = "npm run build"
  publish = "dist/kopio-office/browser"

[build.environment]
  NODE_VERSION = "22"

[context.production]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
