<section
  class="route-shell landing-page"
  (mousemove)="trackPointer($event)"
  (touchstart)="trackTouch($event)"
  (touchmove)="trackTouch($event)"
>
  <div class="landing-page__inner">
    @if (showMotionPrompt()) {
      <div class="landing-page__motion-prompt">
        <p>Enable motion to move the coordinates with your phone.</p>
        <button type="button" class="landing-page__motion-button" (click)="enableMotionTracking()">
          Enable Motion
        </button>
      </div>
    }

    <div class="landing-page__coordinates landing-page__coordinates--left">
      <span>{{ latitude().major }}</span>
      <span>{{ latitude().minor }}</span>
    </div>

    <a
      class="landing-page__title"
      [routerLink]="heroNavigationEnabled() ? homeRoute : null"
      [attr.aria-disabled]="!heroNavigationEnabled()"
    >
      <span>{{ siteTitle }}</span>
    </a>

    <div class="landing-page__coordinates landing-page__coordinates--right">
      <span>{{ longitude().major }}</span>
      <span>{{ longitude().minor }}</span>
    </div>
  </div>
</section>
